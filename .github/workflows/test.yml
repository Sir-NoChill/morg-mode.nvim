name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        neovim: [stable, nightly]

    runs-on: ${{ matrix.os }}
    name: "OS: ${{ matrix.os }} - Neovim: ${{ matrix.neovim }}"

    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Setup Lua test environment
        run: |
          sudo apt-get update && sudo apt-get install -y libreadline-dev || true
          pip install hererocks
          hererocks .lua-env --lua 5.1 --luarocks latest
          .lua-env/bin/luarocks install busted
          .lua-env/bin/luarocks install nlua
          .lua-env/bin/luarocks install luafilesystem
      - name: Run tests
        run: |
          export PATH="$PWD/.lua-env/bin:$PATH"
          eval "$(.lua-env/bin/luarocks path)"
          busted .
